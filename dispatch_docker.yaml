server: http://cairn-server:8000
runtime:
  interval: 3
  max_workers: 8
  max_running_projects: 3
  max_project_workers: 4
  healthcheck_timeout: 20
  prompt_group: default
tasks:
  bootstrap:
    timeout: 300
    conclude_timeout: 90
  reason:
    timeout: 300
    max_intents: 2
    allow_unavailable_dispatch: false
    unavailable_fact_limit: 2
  explore:
    timeout: 300
    conclude_timeout: 90
  observe:
    enabled: false
    timeout: 300
    min_interval_seconds: 60
    recent_run_limit: 10
    max_updates: 4
execution:
  backend: docker
  work_dir: .cairn-runtime
container:
  image: ghcr.io/oritera/cairn-worker-container:latest
  network_mode: host
  completed_action: stop
  session_volume: cairn-worker-sessions
  session_home: /cairn-observer-sessions
common_env:
  TSEC_SERVER_HOST: 10.0.0.44:8000
  TSEC_AGENT_TOKEN: xxx
  PI_DIR: /cairn-observer-sessions/.pi/agent/sessions
workers:
- name: claudecode_deepseek-v4-pro
  type: claudecode
  task_types:
  - bootstrap
  - reason
  - explore
  max_running: 2
  priority: 1
  env:
    ANTHROPIC_MODEL: deepseek-v4-pro
    ANTHROPIC_BASE_URL: https://api.deepseek.com/anthropic
  enabled: false
- name: codex_gpt5.4
  type: codex
  task_types:
  - bootstrap
  - reason
  - explore
  max_running: 2
  priority: 0
  env:
    CODEX_MODEL: gpt-5.4
    CODEX_BASE_URL: https://api.openai.com/v1
    OPENAI_API_KEY: sk-your-openai-api-key
  enabled: true
