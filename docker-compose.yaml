services:
  cairn-server:
    build:
      context: .
      dockerfile: Dockerfile
    image: cairn-app
    container_name: cairn-server
    ports:
      - "8000:8000"
    volumes:
      - ./datas/cairn/:/root/.local/share/cairn/
      - ./datas/cairn-runtime:/cairn/.cairn-runtime
      - ./skills:/cairn/skills:ro
      - ./dispatch_docker.yaml:/cairn/dispatch.yaml
    environment:
      CAIRN_DISPATCH_CONFIG: /cairn/dispatch.yaml
      CAIRN_UI_DISPATCH_CONFIG: /root/.local/share/cairn/dispatch_ui.yaml
      CAIRN_DISPATCH_SETTINGS_MODE: ${CAIRN_DISPATCH_SETTINGS_MODE:-ui}
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/projects', timeout=5)"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 3s
    restart: unless-stopped
    command: ["uv", "run", "cairn", "serve", "--host", "0.0.0.0", "--no-access-log"]

  cairn-dispatcher:
    build:
      context: .
      dockerfile: Dockerfile
    image: cairn-app
    container_name: cairn-dispatcher
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./dispatch_docker.yaml:/cairn/dispatch.yaml:ro
      - ./datas/cairn/:/root/.local/share/cairn/
      - ./datas/cairn-runtime:/cairn/.cairn-runtime
      - ./skills:/cairn/skills:ro
    environment:
      CAIRN_DISPATCH_CONFIG: /cairn/dispatch.yaml
      CAIRN_UI_DISPATCH_CONFIG: /root/.local/share/cairn/dispatch_ui.yaml
      CAIRN_DISPATCH_SETTINGS_MODE: ${CAIRN_DISPATCH_SETTINGS_MODE:-ui}
    depends_on:
      cairn-server:
        condition: service_healthy
    restart: unless-stopped
    command: ["uv", "run", "cairn", "dispatch"]

  cairn-observer:
    image: debian:bookworm-slim
    container_name: cairn-observer
    ports:
      - "8081:8081"
    volumes:
      - ./observer/agentsview:/src
      - ./scripts:/src/scripts:ro
      - ./datas/cairn-runtime:/runtime
      - ./datas/cairn:/cairn-data:ro
      - ./datas/cairn-observer-shared:/observer-shared
      - cairn-worker-sessions:/cairn-observer-sessions
    working_dir: /src
    environment:
      CAIRN_ONLY: "1"
      CAIRN_RUNS_DIR: /runtime/observer/runs
      CAIRN_DB_PATH: /cairn-data/cairn.db
      AGENTSVIEW_DATA_DIR: /runtime/agentsview-data
      CAIRN_RUNTIME_DIR: /runtime
      CLAUDE_PROJECTS_DIR: /runtime/observer/claude-projects
      CODEX_SESSIONS_DIR: /runtime/observer/codex-sessions
      PI_DIR: /runtime/observer/pi-sessions
      CAIRN_SHARED_SESSIONS_ROOT: /observer-shared
    depends_on:
      cairn-server:
        condition: service_healthy
    restart: unless-stopped
    command:
      - sh
      - -lc
      - |
        rm -rf /runtime/observer/codex-sessions /runtime/observer/claude-projects /runtime/observer/pi-sessions
        mkdir -p /runtime/observer/codex-sessions /runtime/observer/claude-projects /runtime/observer/pi-sessions
        /src/scripts/sync-cairn-agent-sessions.sh --once >/tmp/observer-sync-bootstrap.log 2>&1
        /src/scripts/sync-cairn-agent-sessions.sh >/tmp/observer-sync.log 2>&1 &
        exec ./agentsview serve --host 0.0.0.0 --port 8081 --no-browser --require-auth

volumes:
  cairn-worker-sessions:
    external: true
