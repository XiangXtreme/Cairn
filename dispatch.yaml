server: http://127.0.0.1:8000
common_env:
  TSEC_SERVER_HOST: 10.0.0.44:8000
  TSEC_AGENT_TOKEN: xxx
runtime:
  interval: 3
  max_workers: 8
  max_running_projects: 3
  max_project_workers: 2
  healthcheck_timeout: 20
  prompt_group: default
tasks:
  bootstrap:
    timeout: 300
    conclude_timeout: 90
  reason:
    timeout: 300
    max_intents: 1
    allow_unavailable_dispatch: false
    unavailable_fact_limit: 2
  explore:
    timeout: 300
    conclude_timeout: 90
  observe:
    enabled: false
    timeout: 300
    min_interval_seconds: 60
    recent_run_limit: 10
    max_updates: 4
execution:
  work_dir: datas/cairn-runtime
workers:
- name: claudecode_deepseek-v4-pro
  type: claudecode
  task_types:
  - bootstrap
  - reason
  - explore
  max_running: 2
  priority: 0
  env:
    ANTHROPIC_MODEL: deepseek-v4-pro
    ANTHROPIC_BASE_URL: https://api.deepseek.com/anthropic
    ANTHROPIC_AUTH_TOKEN: sk-your-deepseek-api-key
    CAIRN_PROVIDER_SPEC: '{"id":"claudecode_deepseek-v4-pro_provider","name":"claudecode_deepseek-v4-pro
      Provider","base_url":"https://api.deepseek.com/anthropic","extra_env":{}}'
  enabled: true
- name: codex_qwen3.6-plus
  type: codex
  task_types:
  - bootstrap
  - reason
  - explore
  max_running: 2
  priority: 0
  env:
    CODEX_MODEL: qwen3.6-plus
    CODEX_BASE_URL: https://dashscope.aliyuncs.com/compatible-mode/v1
    OPENAI_API_KEY: sk-your-dashscope-api-key
    CAIRN_PROVIDER_SPEC: '{"id":"codex_qwen3.6-plus_provider","name":"codex_qwen3.6-plus
      Provider","base_url":"https://dashscope.aliyuncs.com/compatible-mode/v1","extra_env":{}}'
  enabled: true
- name: pi_qwen3.6-plus
  type: pi
  task_types:
  - bootstrap
  - reason
  - explore
  max_running: 2
  priority: 0
  env:
    PI_MODEL: qwen3.6-plus
    PI_BASE_URL: https://dashscope.aliyuncs.com/compatible-mode/v1
    PI_API_KEY: sk-your-dashscope-api-key
    PI_PROVIDER_API: openai-completions
    PI_MODEL_CONTEXT_WINDOW: '262144'
    CAIRN_PROVIDER_SPEC: '{"id":"pi_qwen3.6-plus_provider","name":"pi_qwen3.6-plus
      Provider","base_url":"https://dashscope.aliyuncs.com/compatible-mode/v1","extra_env":{}}'
  enabled: true
